<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vectonis | Dijital Çözümlerin Adresi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg: #f8f9fa;
      --bg2: #ffffff;
      --bg3: #f1f3f5;
      --acc: #ff4757;
      --acc2: #ffa502;
      --txt: #2d3436;
      --muted: #636e72;
      --bdr: #dfe6e9;
      --shadow: rgba(0,0,0,0.06);
    }
    
    body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden;}
    nav{padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);background:rgba(255,255,255,0.95);box-shadow:0 2px 10px var(--shadow)}
    .logo{font-family:'Syne',system-ui,sans-serif;font-weight:800;font-size:1.3rem;color:var(--txt)}
    .logo-dot{color:var(--acc)}
    .badge{font-size:.68rem;font-weight:600;color:var(--acc);border:1px solid rgba(255,71,87,0.3);padding:.25rem .7rem;border-radius:100px;letter-spacing:.06em;background:rgba(255,71,87,0.05)}
    
    .hero{padding:4rem 2rem 2.5rem;text-align:center;position:relative}
    h1{font-family:'Syne',system-ui,sans-serif;font-weight:800;font-size:clamp(2.2rem,5vw,4rem);line-height:1.1;margin-bottom:1rem}
    h1 span{background:linear-gradient(120deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hero-p{color:var(--muted);font-size:0.95rem;max-width:450px;margin:0 auto}
    
    .game-sec{padding:2rem 1.2rem;max-width:700px;margin:0 auto}
    .game-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:24px;overflow:hidden;box-shadow:0 15px 35px var(--shadow);position:relative}
    
    .game-selector{display:flex;gap:6px;padding:12px;background:var(--bg3);border-bottom:1px solid var(--bdr)}
    .sbtn{flex:1;padding:10px;border:none;border-radius:12px;background:white;font-weight:600;cursor:pointer;font-size:0.8rem;color:var(--txt);transition:all 0.2s}
    .sbtn.active{background:var(--acc);color:white;box-shadow:0 4px 12px rgba(255,71,87,0.25)}
    
    canvas#gc{display:block;width:100%;touch-action:none;cursor:pointer;background:#ffffff}
    
    .game-bar{padding:.9rem 1.4rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem;border-top:1px solid var(--bdr);background:var(--bg2)}
    .stat{display:flex;flex-direction:column;align-items:center}
    .sl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
    .sv{font-family:'Syne',system-ui,sans-serif;font-weight:800;font-size:1.15rem;color:var(--txt)}
    
    .btn-row{display:flex;gap:.5rem;align-items:center}
    .gbtn{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;padding:.6rem 1.4rem;border-radius:100px;font-size:.82rem;font-weight:600;cursor:pointer;box-shadow:0 4px 15px rgba(255,71,87,0.2)}
    .hbtn{background:var(--bg3);color:var(--txt);border:1px solid var(--bdr);padding:.6rem 1.1rem;border-radius:100px;font-size:.82rem;font-weight:600;cursor:pointer}
    
    .contact-sec{padding:3rem 1.2rem;max-width:700px;margin:0 auto}
    .cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.5rem}
    .cc{background:var(--bg2);padding:1.5rem;display:flex;flex-direction:column;gap:.3rem;border-radius:16px;border:1px solid var(--bdr);box-shadow:0 4px 15px var(--shadow)}
    .cl{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--acc);font-weight:700}
    .cv{font-size:1rem;font-weight:600;color:var(--txt);margin-top:.2rem}
    a{color:inherit;text-decoration:none}
    
    footer{border-top:1px solid var(--bdr);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
    .fl{font-family:'Syne',system-ui,sans-serif;font-weight:800;font-size:.95rem}
    .fr{font-size:.8rem;color:var(--muted)}
  </style>
</head>
<body>

  <nav>
    <div class="logo">Vectonis<span class="logo-dot">.</span></div>
    <div class="badge">Yakında • Coming Soon</div>
  </nav>

  <section class="hero">
    <h1>Dijital<span> Çözümlerin</span> Adresi</h1>
    <p class="hero-p">Vectonis Bilişim olarak kurumsal yazılım sunuyoruz. Sitemiz hazırlanırken oyunların tadını çıkarın!</p>
  </section>

  <section class="game-sec">
    <div class="game-box">
      <div class="game-selector">
        <button class="sbtn active" onclick="switchGame('breakout')">Breakout</button>
        <button class="sbtn" onclick="switchGame('stack')">Tech Stack</button>
        <button class="sbtn" onclick="switchGame('defense')">Firewall Defense</button>
      </div>

      <canvas id="gc" height="400"></canvas>

      <div class="game-bar">
        <div class="stat"><span class="sl">Skor</span><span class="sv" id="sc">0</span></div>
        <div class="stat"><span class="sl">En Yüksek</span><span class="sv" id="hs">0</span></div>
        <div class="stat"><span class="sl">Durum</span><span class="sv" id="st">Seviye 1</span></div>
        <div class="btn-row">
          <button class="hbtn" id="pauseBtn">Durdur</button>
          <button class="gbtn" id="startBtn">Başla</button>
        </div>
      </div>
    </div>
  </section>

  <section class="contact-sec">
    <div class="cgrid">
      <div class="cc"><div class="cl">Konum</div><div class="cv">Ankara</div></div>
      <div class="cc"><div class="cl">E-posta</div><div class="cv"><a href="mailto:info@vectonis.com">info@vectonis.com</a></div></div>
      <div class="cc"><div class="cl">Çalışma</div><div class="cv">09:00 — 18:00</div></div>
    </div>
  </section>

  <footer>
    <div class="fl">Vectonis Bilişim</div>
    <div class="fr">© 2026 Tüm hakları saklıdır.</div>
  </footer>

  <script>
    const canvas = document.getElementById('gc');
    const ctx = canvas.getContext('2d');
    const scEl = document.getElementById('sc');
    const hsEl = document.getElementById('hs');
    const stEl = document.getElementById('st');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    let W = 400, H = 400;
    canvas.width = W; canvas.height = H;

    let activeGame = 'breakout', running = false, paused = false, score = 0, animId;
    let highScores = { breakout: 0, stack: 0, defense: 0 };

    function switchGame(gameType) {
      if(running) stopGame();
      activeGame = gameType;
      document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      score = 0;
      paused = false;
      updateUI();
      drawIdle();
    }

    function updateUI() {
      scEl.textContent = score;
      hsEl.textContent = highScores[activeGame];
      if(activeGame === 'stack') {
        stEl.textContent = 'Sonsuz';
      } else {
        stEl.textContent = 'Seviye ' + level;
      }
    }

    function stopGame() {
      running = false;
      cancelAnimationFrame(animId);
      if(score > highScores[activeGame]) {
        highScores[activeGame] = score;
      }
      updateUI();
    }

    let mouseX = W/2, keys = {};
    canvas.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      mouseX = (e.clientX - r.left) * (W / r.width);
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const r = canvas.getBoundingClientRect();
      mouseX = (e.touches[0].clientX - r.left) * (W / r.width);
    }, {passive:false});

    window.addEventListener('keydown', e => { keys[e.key] = true; if(e.key === ' ' && activeGame === 'stack') handleStackClick(); });
    window.addEventListener('keyup', e => { keys[e.key] = false; });
    canvas.addEventListener('click', () => { if(activeGame === 'stack') handleStackClick(); if(activeGame === 'defense') handleDefenseShoot(); });

    pauseBtn.addEventListener('click', () => {
      if(!running) return;
      paused = !paused;
      pauseBtn.textContent = paused ? 'Devam' : 'Durdur';
    });

    startBtn.addEventListener('click', () => {
      stopGame();
      running = true; paused = false;
      pauseBtn.textContent = 'Durdur';
      if(activeGame === 'breakout') initBreakout();
      else if(activeGame === 'stack') initStack();
      else if(activeGame === 'defense') initDefense();
      updateUI();
      loop();
    });

    let paddle, ball, bricks, level;
    function initBreakout() {
      level = 1; score = 0;
      buildBreakoutLevel();
    }
    function buildBreakoutLevel() {
      paddle = { x: W/2 - 40, y: H - 30, w: Math.max(40, 90 - level * 10), h: 10 };
      ball = { x: W/2, y: H - 50, vx: (2 + level), vy: -(2 + level), r: 7 };
      bricks = [];
      let rows = 2 + level;
      let cols = 8;
      for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
          bricks.push({ x: c * 46 + 18, y: r * 18 + 50, w: 40, h: 12, hp: Math.ceil((rows-r)/2), active: true });
        }
      }
    }
    function runBreakout() {
      paddle.x = mouseX - paddle.w/2;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

      ball.x += ball.vx; ball.y += ball.vy;

      if(ball.x - ball.r < 0 || ball.x + ball.r > W) ball.vx *= -1;
      if(ball.y - ball.r < 0) ball.vy *= -1;

      if(ball.y + ball.r > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.w && ball.vy > 0) {
        ball.vy *= -1;
      }

      if(ball.y > H) {
        stopGame(); drawGameOver(); return;
      }

      bricks.forEach(b => {
        if(!b.active) return;
        if(ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
          ball.vy *= -1;
          b.hp--;
          if(b.hp <= 0) { b.active = false; score += 10; updateUI(); }
        }
      });

      if(bricks.every(b => !b.active)) {
        if(level < 5) {
          level++; buildBreakoutLevel(); updateUI();
        } else {
          stopGame(); drawWin(); return;
        }
      }

      ctx.fillStyle = '#ff4757'; ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fillStyle = '#ff6b81'; ctx.fill();
      bricks.forEach(b => {
        if(!b.active) return;
        ctx.fillStyle = b.hp > 1 ? '#ffa502' : '#2ed573';
        ctx.fillRect(b.x, b.y, b.w, b.h);
      });
    }

    let stackLayers, currentLayer, stackDir, stackSpeed;
    function initStack() {
      score = 0; level = 'Sonsuz';
      stackLayers = [{ x: W/2 - 50, w: 100, y: H - 20 }];
      currentLayer = { x: 0, w: 100, y: H - 40 };
      stackDir = 1;
      stackSpeed = 3;
    }
    function handleStackClick() {
      if(!running || paused || activeGame !== 'stack') return;
      let prev = stackLayers[stackLayers.length - 1];
      let diff = currentLayer.x - prev.x;
      
      if(Math.abs(diff) >= currentLayer.w) {
        stopGame(); drawGameOver(); return;
      }

      let newWidth = currentLayer.w - Math.abs(diff);
      let newX = diff > 0 ? currentLayer.x : prev.x;

      stackLayers.push({ x: newX, w: newWidth, y: currentLayer.y });
      score += 1; updateUI();

      currentLayer = { x: stackDir > 0 ? 0 : W - newWidth, w: newWidth, y: currentLayer.y - 20 };
      stackSpeed = 3 + Math.floor(stackLayers.length / 5);

      if(currentLayer.y < 100) {
        stackLayers.forEach(l => l.y += 20);
        currentLayer.y += 20;
      }
    }
    function runStack() {
      currentLayer.x += stackDir * stackSpeed;
      if(currentLayer.x < 0 || currentLayer.x + currentLayer.w > W) stackDir *= -1;

      ctx.fillStyle = '#ffa502';
      stackLayers.forEach((l, i) => {
        ctx.fillStyle = `hsl(${(i * 15) % 360}, 85%, 60%)`;
        ctx.fillRect(l.x, l.y, l.w, 18);
      });
      ctx.fillStyle = '#ff4757';
      ctx.fillRect(currentLayer.x, currentLayer.y, currentLayer.w, 18);
    }

    let player, lasers, enemies, enemyWave, enemyDir;
    function initDefense() {
      level = 1; score = 0;
      player = { x: W/2 - 15, y: H - 30, w: 30, h: 15, speed: 5 };
      lasers = [];
      buildDefenseLevel();
    }
    function buildDefenseLevel() {
      enemies = [];
      lasers = [];
      let rows = 2 + level;
      let cols = 6;
      for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
          enemies.push({ x: c * 45 + 50, y: r * 25 + 40, w: 25, h: 15, alive: true });
        }
      }
      enemyDir = 1;
    }
    function handleDefenseShoot() {
      if(!running || paused || activeGame !== 'defense') return;
      lasers.push({ x: player.x + player.w/2, y: player.y, vy: -6 });
    }
    function runDefense() {
      if(keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
      if(keys['ArrowRight'] || keys['d']) player.x += player.speed;
      player.x = Math.max(0, Math.min(W - player.w, player.x));

      lasers.forEach((l, li) => {
        l.y += l.vy;
        if(l.y < 0) lasers.splice(li, 1);
      });

      let shiftDown = false;
      enemies.forEach(e => {
        if(!e.alive) return;
        e.x += enemyDir * (1 + level * 0.5);
        if(e.x < 10 || e.x + e.w > W - 10) shiftDown = true;
        if(e.y + e.h > player.y) { stopGame(); drawGameOver(); return; }
      });

      if(shiftDown) {
        enemyDir *= -1;
        enemies.forEach(e => { if(e.alive) e.y += 12; });
      }

      lasers.forEach((l, li) => {
        enemies.forEach(e => {
          if(!e.alive) return;
          if(l.x > e.x && l.x < e.x + e.w && l.y > e.y && l.y < e.y + e.h) {
            e.alive = false;
            lasers.splice(li, 1);
            score += 20; updateUI();
          }
        });
      });

      if(enemies.every(e => !e.alive)) {
        if(level < 5) {
          level++; buildDefenseLevel(); updateUI();
        } else {
          stopGame(); drawWin(); return;
        }
      }

      ctx.fillStyle = '#2ed573'; ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.fillStyle = '#1e90ff'; lasers.forEach(l => ctx.fillRect(l.x - 2, l.y, 4, 10));
      ctx.fillStyle = '#ff4757'; enemies.forEach(e => { if(e.alive) ctx.fillRect(e.x, e.y, e.w, e.h); });
    }

    function loop() {
      if(!running) return;
      ctx.clearRect(0,0,W,H);

      if(paused) {
        ctx.fillStyle = '#2d3436'; ctx.font = 'bold 20px Syne'; ctx.textAlign = 'center';
        ctx.fillText('OYUN DURDURULDU', W/2, H/2);
        animId = requestAnimationFrame(loop);
        return;
      }

      if(activeGame === 'breakout') runBreakout();
      else if(activeGame === 'stack') runStack();
      else if(activeGame === 'defense') runDefense();

      if(running) animId = requestAnimationFrame(loop);
    }

    function drawIdle() {
      ctx.fillStyle = '#f1f3f5'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#2d3436'; ctx.font = '600 15px DM Sans'; ctx.textAlign = 'center';
      ctx.fillText('Oynamak için "Başla" butonuna bas', W/2, H/2);
    }
    function drawGameOver() {
      ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#ff4757'; ctx.font = 'bold 24px Syne'; ctx.textAlign = 'center';
      ctx.fillText('OYUN BİTTİ!', W/2, H/2 - 10);
      ctx.fillStyle = '#636e72'; ctx.font = '600 14px DM Sans';
      ctx.fillText('Skorun: ' + score, W/2, H/2 + 20);
    }
    function drawWin() {
      ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#2ed573'; ctx.font = 'bold 24px Syne'; ctx.textAlign = 'center';
      ctx.fillText('TEBRİKLER, TÜM BÖLÜMLER BİTTİ!', W/2, H/2 - 10);
      ctx.fillStyle = '#636e72'; ctx.font = '600 14px DM Sans';
      ctx.fillText('Kusursuz Skor: ' + score, W/2, H/2 + 20);
    }

    drawIdle();
  </script>
</body>
</html>
